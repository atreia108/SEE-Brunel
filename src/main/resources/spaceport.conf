# VPN address of SEE server instance.
# rtiAddress = 10.0.0.1:8989
# Local server RTI configuration.
rtiAddress = 172.20.10.7:8989
federationName = SEE 2026
federateName = Brunel_Spaceport
federateType = Facility
# Following are the expected parameters for a late-joiner SEE federate. You can leave them untouched.
federateRole = late
lookahead = 1000000
timeRegulating = true
timeConstrained = true
# Only uncomment the following line if you have any FOM module extensions. All your FOM modules are to be placed in the
# directory mentioned below (which can be set to somewhere else on your filesystem).
fomDirectory = src/main/resources/foms